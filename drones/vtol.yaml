# ===========================================================================
# Drone spec — Heavy multirotor (VTOL airframe), 10 kg class, weak yaw.
#
# This file is INPUT to your drone simulator. Your DroneSimulator reads it
# at construction time and uses every field below to drive its physics.
# DO NOT MODIFY this file — at evaluation time the organizers run your
# simulator against the unmodified copy. This is the ONLY airframe in
# this edition of the challenge.
#
# Operating regime: HOVER / MULTIROTOR ONLY.
# Although the airframe has wings (large fuselage + 1.7 m wingspan), the
# challenge does NOT require modelling forward flight, hover↔cruise
# transition, tilt servos, or wing lift. Treat this as a heavy quadrotor
# whose four lift rotors point vertically at all times. The wings exist
# only as visual mass + drag — they are why drag_linear[y] is high.
#
# Operating quirks of this airframe:
#   * Yaw authority is weak (high Izz, small k_Q-to-k_T ratio). Reaching
#     steady-state yaw rate takes ~2 s — you cannot use yaw to bail out
#     of a late misalignment.
#   * To land "fuselage axis aligned with boat heading" you have to
#     commit to a yaw setpoint EARLY in the approach.
#   * Inertias are asymmetric: pitch is sluggish (long fuselage), roll is
#     much snappier than pitch.
#
# Coordinate convention: PyBullet ENU body frame.
#   x = forward (along fuselage)   y = left (along wing)   z = up
# ===========================================================================

name: "Heavy multirotor (VTOL airframe) 10kg"
type: "heavy_multirotor"
description: |
  10 kg class. 1.7 m wingspan, ~2 m fuselage, four vertically-mounted
  lift rotors. Always operated in multirotor mode — no forward flight,
  no transition. Limited yaw authority makes early heading planning
  essential.

# ----- Bulk physical properties --------------------------------------------
mass: 10.0           # [kg]
inertia:             # body-frame, diagonal (off-diagonal assumed 0)
  Ixx: 2.54          # [kg*m^2] roll  (axis along fuselage)
  Iyy: 3.47          # [kg*m^2] pitch (axis across wings)
  Izz: 5.74          # [kg*m^2] yaw   (vertical axis — large because long fuselage AND wide wings)

# ----- Geometry ------------------------------------------------------------
# Collision box is the FUSELAGE only — the wings are visual silhouette and
# do not collide. The drone is allowed to overhang the platform with its
# wings and still land.
geometry:
  collision_box:
    length: 0.50     # [m] fuselage along body x
    width:  0.30     # [m] fuselage across body y
    height: 0.10     # [m] fuselage height
  collision_offset_z: -0.05   # [m] fuselage hangs below the wing/COM plane

# ----- Motors --------------------------------------------------------------
# Four lift rotors in an X-stretched configuration: two at the fuselage
# nose/tail (long arm in x), two at the wing roots (shorter arm in y).
# All thrust axes are body +z (vertical lift). Spins alternate so net
# drag torque cancels at hover. The differential drag torque (yaw control)
# is small relative to the body Izz — that's the source of "weak yaw".
motors:
  - id: 0   # nose-right wing root
    position:    [ 1.00, -0.85, 0.0 ]
    thrust_axis: [ 0.0,   0.0,  1.0 ]
    spin: -1
  - id: 1   # tail-right wing root
    position:    [-1.00, -0.85, 0.0 ]
    thrust_axis: [ 0.0,   0.0,  1.0 ]
    spin: +1
  - id: 2   # tail-left wing root
    position:    [-1.00,  0.85, 0.0 ]
    thrust_axis: [ 0.0,   0.0,  1.0 ]
    spin: -1
  - id: 3   # nose-left wing root
    position:    [ 1.00,  0.85, 0.0 ]
    thrust_axis: [ 0.0,   0.0,  1.0 ]
    spin: +1

# ----- Per-motor parameters (assumed identical across all 4 motors) --------
# Reference motor: T-Motor MN1005 (KV90, 48V supply via V100A ESC, 24" prop
# T-Motor P24×7.2 CF). This is a real heavy-lift combo — the same class
# you'd find on an Inspire-2-sized agricultural drone. KV90 × 48 V no-load
# = 4320 RPM, prop loads it down to ~3340 RPM at full throttle.
# Measured static thrust bench (T-Motor data sheet, P24 prop, 25 °C):
#   throttle  RPM     thrust   current  torque
#   30%       1030    490 gf    1.6 A   0.18 N·m
#   60%       2050    1880 gf   6.0 A   0.69 N·m
#   70%       ~2370   ~2510 gf  ~8.5 A  ~0.92 N·m  ← hover for 10 kg drone
#   100%      3340    5040 gf  21.8 A   1.85 N·m
# All "per-motor" values below come from this characterisation.
motor:
  omega_max: 350.0      # [rad/s] full-throttle loaded RPM (3340 RPM × 2π/60).
                        #         No-load would be KV·V = 90·48 = 4320 RPM,
                        #         but the prop loads it down to 3340 RPM.
  time_constant: 0.10   # [s] first-order RPM lag. Heavy bell + big prop have
                        #     mass-moment-of-inertia spool time of ~100 ms on
                        #     a V100A ESC. Faster than a 5" racing quad's
                        #     τ would predict for the inertia because the
                        #     beefier ESC sources more current.
  rotor_inertia: 5.0e-3 # [kg*m^2] bell + prop for MN1005 + P24 (motor mass
                        #          340 g, prop mass ~280 g modelled as a thin
                        #          rod of length D)

# ----- Propeller (assumed identical across all motors) ---------------------
# Fit T = k_T·ω², Q = k_Q·ω² on the bench rows 60–80 % throttle (the typical
# hover-cruise range for a 10 kg drone on 4 of these motors):
#   k_T = 4.0e-4   (matches T=24.5 N at ω=247.5 rad/s, the hover point)
#   k_Q = 8.0e-6
# The model slightly underpredicts thrust at full throttle (model says
# 49 N, bench gives 50.4 N) and overpredicts at very low throttle. Good
# fit in the operating regime; participants are free to add quadratic-fit
# corrections for higher fidelity.
# k_Q / k_T = 0.020 → yaw authority remains weak (high Izz, small drag
# torque per unit thrust torque).
propeller:
  thrust_coefficient: 4.0e-4    # [N / (rad/s)^2]   T = k_T * omega^2
  drag_coefficient:   8.0e-6    # [N*m / (rad/s)^2] Q = k_Q * omega^2
  diameter: 0.61                # [m] 24" lift prop. Used by ground-effect models.

# ----- Battery (electrical model — tier 1) ---------------------------------
# Sized for the 48 V test supply: a 12S Li-Po pack (12 × 3.7 V = 44.4 V
# nominal, 50.4 V fully charged). Capacity sized for ~6-minute hover at
# the measured hover current (4 motors × ~8.5 A = 34 A at 44 V ≈ 1500 W,
# 25 Ah pack → 4.4 min hover ignoring losses, plenty for the 60 s eval).
battery:
  capacity_Wh:        1110.0  # 25 Ah at 12S nominal (44.4 V × 25 Ah = 1110 Wh)
  voltage_nominal:    44.4    # 12S LiPo
  internal_resistance: 0.025  # [ohm] typical 12S 25 Ah 20C pack

# ----- Aerodynamics (tier 1, optional) -------------------------------------
# Bigger drag than the quad — the wings give substantial lateral drag.
# Realistic VTOL drag at 5 m/s is ~5-10 N along x or y.
aero:
  drag_linear:    [0.50, 1.20, 0.80]   # [N / (m/s)] — high y term: wing surface side-on
  drag_quadratic: [0.0,  0.0,  0.0]    # [N / (m/s)^2]
